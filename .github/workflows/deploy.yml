name: Deploy to 129.211.9.242:4006

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-daifaxitong
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and build
        run: npm run deploy:check

  deploy:
    name: Deploy server
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: secrets
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          missing=()
          [ -n "$SERVER_USER" ] || missing+=(SERVER_USER)
          [ -n "$SERVER_SSH_KEY" ] || missing+=(SERVER_SSH_KEY)
          [ -n "$ADMIN_PASSWORD" ] || missing+=(ADMIN_PASSWORD)
          [ -n "$SESSION_SECRET" ] || missing+=(SESSION_SECRET)

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Missing GitHub Secrets: ${missing[*]}. Deployment skipped."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deployment package
        if: steps.secrets.outputs.ready == 'true'
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='server/data' \
            --exclude='server/uploads' \
            --exclude='server/logs' \
            --exclude='.env' \
            --exclude='deploy-package.tar.gz' \
            -czf "$RUNNER_TEMP/deploy-package.tar.gz" .
          cp "$RUNNER_TEMP/deploy-package.tar.gz" deploy-package.tar.gz

      - name: Upload deployment package
        if: steps.secrets.outputs.ready == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 129.211.9.242
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: deploy-package.tar.gz
          target: /tmp/daifaxitong-deploy-${{ github.run_id }}

      - name: Deploy over SSH
        if: steps.secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PACKAGE_DIR: /tmp/daifaxitong-deploy-${{ github.run_id }}
          DEPLOY_PORT: "4006"
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        with:
          host: 129.211.9.242
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          envs: DEPLOY_PATH,DEPLOY_PACKAGE_DIR,DEPLOY_PORT,ADMIN_USERNAME,ADMIN_PASSWORD,SESSION_SECRET,DINGTALK_WEBHOOK,DINGTALK_SECRET,FEISHU_WEBHOOK,FEISHU_SECRET
          script: |
            set -eu

            APP_DIR="${DEPLOY_PATH:-/www/wwwroot/daifaxitong}"
            PACKAGE="${DEPLOY_PACKAGE_DIR:?DEPLOY_PACKAGE_DIR is required}/deploy-package.tar.gz"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            if [ -d server/data ]; then
              backup_dir="${HOME}/backups/daifaxitong"
              mkdir -p "$backup_dir"
              backup_file="${backup_dir}/data-before-update-$(date +%Y%m%d-%H%M%S).tar.gz"
              tar -czf "$backup_file" server/data
              ls -lh "$backup_file"
            fi

            staging_dir="$(mktemp -d)"
            tar -xzf "$PACKAGE" -C "$staging_dir"
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete \
                --exclude='.git' \
                --exclude='.env' \
                --exclude='server/data' \
                --exclude='server/uploads' \
                --exclude='server/logs' \
                "$staging_dir"/ "$APP_DIR"/
            else
              tar -xzf "$PACKAGE" -C "$APP_DIR"
            fi
            rm -rf "$staging_dir" "$DEPLOY_PACKAGE_DIR"

            bash scripts/server-deploy.sh
